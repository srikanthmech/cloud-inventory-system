name: Python App & Docker CI/CD to AWS ECR

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-2                   # e.g., us-east-1 or us-east-2
  ECR_REGISTRY: 383418747940.dkr.ecr.us-east-2.amazonaws.com           # e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: cloud-inventory-system        # Your ECR repo name

jobs:
  build-and-ship:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets::AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets::AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to Amazon ECR
      run: |
        # Build the container exactly like before
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Tag it with the unique GitHub commit hash so we track history
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        
        # Push both tags directly up to your private AWS storage locker
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}